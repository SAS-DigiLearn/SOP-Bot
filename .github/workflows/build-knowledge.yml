name: Build Knowledge Base & Jekyll Site

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "tools/build-knowledge.js"
      - "package.json"
      - "_config.yml"

concurrency:
  group: build-knowledge-jekyll-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    # Force Actions to run on Node 24 to avoid Node 20 deprecation issues
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v5

      # 2️⃣ Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      # 3️⃣ Cache npm dependencies
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # 4️⃣ Install Node dependencies
      - name: Install dependencies
        run: npm install

      # 5️⃣ Build knowledge.json
      - name: Build Knowledge Base
        run: npm run build

      # 6️⃣ Commit knowledge.json if it changed
      - name: Commit updated knowledge.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/knowledge.json
          git diff --cached --quiet || git commit -m "Update knowledge base"
          git push || echo "No changes to push"

      # 7️⃣ Build Jekyll site
      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          source_dir: './'
          destination_dir: './_site'

      # 8️⃣ Optional: deploy or upload
      - name: Deploy / Upload
        run: |
          echo "Add your deploy steps here (e.g., GitHub Pages, S3, Netlify, etc.)"
